name: Deploy Produção

on:
  # Deploy manual via GitHub UI com escolha de componente
  workflow_dispatch:
    inputs:
      componente:
        description: "Componente a deployar"
        required: true
        default: "all"
        type: choice
        options: [all, api, worker]

  # Deploy automático em push para main (após CI verde).
  # Mudanças apenas de documentação ou do seeder não disparam deploy.
  push:
    branches: ["main"]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".ia/**"
      - "infra/scripts/seed.py"

jobs:
  build-and-test:
    name: Build, Testes e Publicação
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configurar .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restaurar dependências
        run: dotnet restore

      - name: Testes de domínio
        run: dotnet test tests/Visiosys.Domain.Tests/Visiosys.Domain.Tests.csproj --configuration Release --logger "console;verbosity=minimal"

      - name: Testes de integração
        run: dotnet test tests/Visiosys.Integration.Tests/Visiosys.Integration.Tests.csproj --configuration Release --logger "console;verbosity=minimal"

      # Build do frontend ANTES do publish: o Vite gera o output em
      # src/Visiosys.Api/wwwroot, que precisa existir antes do dotnet publish
      # para ser empacotado junto com a API.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: src/Visiosys.Frontend/package-lock.json

      - name: Build Frontend
        working-directory: src/Visiosys.Frontend
        run: |
          npm ci
          npm run build

      # Build self-contained para linux-arm64 (EC2 Graviton)
      - name: Publicar API (linux-arm64)
        run: |
          dotnet publish src/Visiosys.Api/Visiosys.Api.csproj \
            --configuration Release \
            --runtime linux-arm64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:EnableCompressionInSingleFile=true \
            --output publish/api

      - name: Publicar Worker (linux-arm64)
        run: |
          dotnet publish src/Visiosys.Worker/Visiosys.Worker.csproj \
            --configuration Release \
            --runtime linux-arm64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:EnableCompressionInSingleFile=true \
            --output publish/worker

      - name: Empacotar artefatos
        run: |
          tar -czf api.tar.gz -C publish/api .
          tar -czf worker.tar.gz -C publish/worker .

      - name: Upload artefatos
        uses: actions/upload-artifact@v4
        with:
          name: publish-artifacts
          path: |
            api.tar.gz
            worker.tar.gz
          retention-days: 7

  deploy:
    name: Deploy EC2 (via SSM)
    needs: build-and-test
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write # necessário para autenticar na AWS via OIDC
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Download artefatos
        uses: actions/download-artifact@v4
        with:
          name: publish-artifacts

      - name: Autenticar na AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: sa-east-1

      - name: Publicar artefatos no S3
        id: upload
        run: |
          COMPONENTE="${{ github.event.inputs.componente || 'all' }}"
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          BUCKET="visiosys-deploy-prod-${ACCOUNT_ID}"
          PREFIX="deploy/${{ github.run_id }}"

          aws s3 cp infra/scripts/deploy.sh     "s3://${BUCKET}/${PREFIX}/deploy.sh"
          aws s3 cp infra/scripts/ssm_deploy.sh "s3://${BUCKET}/${PREFIX}/ssm_deploy.sh"

          if [[ "$COMPONENTE" == "api" || "$COMPONENTE" == "all" ]]; then
            aws s3 cp api.tar.gz "s3://${BUCKET}/${PREFIX}/api.tar.gz"
          fi
          if [[ "$COMPONENTE" == "worker" || "$COMPONENTE" == "all" ]]; then
            aws s3 cp worker.tar.gz "s3://${BUCKET}/${PREFIX}/worker.tar.gz"
          fi

          echo "bucket=${BUCKET}" >> "$GITHUB_OUTPUT"
          echo "prefix=${PREFIX}" >> "$GITHUB_OUTPUT"
          echo "componente=${COMPONENTE}" >> "$GITHUB_OUTPUT"

      - name: Acionar deploy na instância via SSM
        run: |
          BUCKET="${{ steps.upload.outputs.bucket }}"
          PREFIX="${{ steps.upload.outputs.prefix }}"
          COMPONENTE="${{ steps.upload.outputs.componente }}"

          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=visiosys-app-prod" "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" --output text)

          if [[ -z "$INSTANCE_ID" || "$INSTANCE_ID" == "None" ]]; then
            echo "Instância EC2 visiosys-app-prod não encontrada."
            exit 1
          fi
          echo "Instância alvo: $INSTANCE_ID"

          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy Visiosys ${COMPONENTE} (run ${{ github.run_id }})" \
            --parameters commands="aws s3 cp s3://${BUCKET}/${PREFIX}/ssm_deploy.sh /tmp/ssm_deploy.sh && chmod +x /tmp/ssm_deploy.sh && /tmp/ssm_deploy.sh ${BUCKET} ${PREFIX} ${COMPONENTE}" \
            --query "Command.CommandId" --output text)
          echo "Comando SSM: $CMD_ID"

          sleep 5
          aws ssm wait command-executed --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" || true

          STATUS=$(aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query Status --output text)
          echo "----- STDOUT -----"
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query StandardOutputContent --output text
          echo "----- STDERR -----"
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query StandardErrorContent --output text
          echo "Status final do deploy: $STATUS"
          [[ "$STATUS" == "Success" ]] || exit 1

      - name: Health check
        run: |
          sleep 5
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.EC2_HOST }}/health)
          if [[ "$HTTP_STATUS" != "200" ]]; then
            echo "Health check falhou: HTTP $HTTP_STATUS"
            exit 1
          fi
          echo "Health check OK: HTTP $HTTP_STATUS"

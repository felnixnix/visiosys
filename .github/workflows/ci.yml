name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    name: Build e Testes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restaurar dependências
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build --no-restore --configuration Release

      - name: Testes de domínio (unit)
        run: dotnet test tests/Visiosys.Domain.Tests/Visiosys.Domain.Tests.csproj --no-build --configuration Release --logger "console;verbosity=minimal"

      - name: Testes de integração (Testcontainers — requer Docker)
        run: dotnet test tests/Visiosys.Integration.Tests/Visiosys.Integration.Tests.csproj --no-build --configuration Release --logger "console;verbosity=minimal"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: src/Visiosys.Frontend/package-lock.json

      - name: Verificação TypeScript do Frontend
        working-directory: src/Visiosys.Frontend
        run: |
          npm ci
          npx tsc -b

      - name: Testes do Frontend (Vitest)
        working-directory: src/Visiosys.Frontend
        run: npm run test
